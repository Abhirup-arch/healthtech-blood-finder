name: Update Blood Stock Data

on:
  schedule:
    - cron: '0 */4 * * *' # Every 4 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and compress blood stock data
        run: |
          npm install
          node scripts/fetchBloodData.js
          
      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/blood_stock.json public/data/blood_stock.json.gz
          # We omit the [skip ci] tag intentionally so that the push triggers a Cloudflare Pages redeploy automatically
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated blood stock data update" && git push)
